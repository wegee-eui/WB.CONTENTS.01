<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive Pattern Builder</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; 
            background-color: #ffffff;
            font-family: 'courier new', 'Courier New', Courier, monospace ;
            overflow: hidden; 
            display: flex;
            flex-direction: column; 
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #ffffff;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        
        #loading-screen {
            position: absolute;
            z-index: 5;
            font-size: 14px;
            letter-spacing: 2px;
            color: #aaa;
        }

        #block-panel {
            width: 100%;
            background: #f8f9fa;
            border-top: 1px solid #eaeaea;
            padding: 15px 0 25px 0; 
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        
        #block-selector {
            display: flex;
            flex-wrap: nowrap; 
            justify-content: center; 
            align-items: center;
            gap: min(12px, 2vw); 
            padding: 0 10px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }
        .block-btn {
            width: clamp(35px, 14vw, 55px);
            height: clamp(35px, 14vw, 55px);
            border: 2px solid #eaeaea;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 1; 
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent; 
        }
        .block-btn:hover {
            transform: translateY(-3px);
            border-color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .block-btn:active {
            transform: translateY(1px);
        }

        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 15px;
        }
        .overlay-title {
            font-size: 24px;
            font-weight: bold;
            color: #111;
            margin-bottom: 10px;
        }
        .action-btn {
            font-family: 'courier new', 'Courier New', Courier, monospace ;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            width: 200px;
            letter-spacing: 0.5px;
        }
        #download-btn { background: #111; color: white; }
        #download-btn:hover { background: #333; transform: scale(1.02); }
        #retry-btn { background: #f0f0f0; color: #333; }
        #retry-btn:hover { background: #e0e0e0; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-screen">LOADING...</div>
    <canvas id="gameCanvas" style="display: none;" data-fall-speed="5" data-move-speed="20"></canvas>
    
    <div id="game-over-overlay" style="display: none;">
        <div class="overlay-title">Pattern Completed</div>
        <button id="download-btn" class="action-btn">Download Image</button>
        <button id="retry-btn" class="action-btn">Retry</button>
    </div>
</div>

<div id="block-panel" style="display: none;">
    <div id="block-selector"></div>
</div>

<div id="block-settings" style="display: none;">
    <img data-w="2" data-h="2" src="image/01T.png" alt="2:2">
    <img data-w="1" data-h="1" src="image/05T.png" alt="1:1">
    <img data-w="6" data-h="1" src="image/03T.png" alt="6:1">
    <img data-w="3" data-h="2" src="image/04T.png" alt="3:2">
    <img data-w="2" data-h="1" src="image/02T.png" alt="2:1">
    <img data-w="3" data-h="1.5" src="image/06T.png" alt="3:1.5">
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    const loadingScreen = document.getElementById('loading-screen');
    const blockPanel = document.getElementById('block-panel');
    const blockSelector = document.getElementById('block-selector');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    
    let fallSpeed = parseFloat(canvas.getAttribute('data-fall-speed')) || 5;
    let moveSpeed = parseFloat(canvas.getAttribute('data-move-speed')) || 20;
    
    let BLOCK_SIZE = 0; 
    let COLS = 0; 
    let CSS_WIDTH = 0;
    let CSS_HEIGHT = 0;

    let SHAPES = [];
    let lockedBlocks = [];
    let activeBlock = null;
    let lastTime = 0;
    let isGameOver = false;
    
    let lockTimer = 0; 
    const LOCK_DELAY = 1.0; 

    const keys = { left: false, right: false, down: false };

    // 🌟 수정된 에셋 로딩 로직 (비동기 순서 섞임 방지)
    function loadAssets() {
        const settingsDiv = document.getElementById('block-settings');
        const imgElements = settingsDiv.querySelectorAll('img');
        let loadedCount = 0;

        // 배열의 길이를 미리 지정하여 순서를 강제 고정합니다.
        SHAPES = new Array(imgElements.length);

        imgElements.forEach((imgEl, index) => {
            const w = parseFloat(imgEl.getAttribute('data-w'));
            const h = parseFloat(imgEl.getAttribute('data-h'));
            const src = imgEl.getAttribute('src');

            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.src = src;
            
            // 로딩 성공 여부와 상관없이 무조건 해당 인덱스(index) 자리에 등록되게 합니다.
            img.onload = () => handleLoad(index, w, h, img, src);
            img.onerror = () => handleLoad(index, w, h, img, src);
        });

        function handleLoad(index, w, h, img, src) {
            // PUSH 대신 인덱스를 직접 지정하여 섞이지 않게 저장
            SHAPES[index] = { origW: w, origH: h, img: img, src: src };
            loadedCount++;
            
            // 모든 이미지가 로딩 완료된 시점에 한 번에 버튼을 순서대로 생성
            if (loadedCount === imgElements.length) {
                SHAPES.forEach((shape, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'block-btn';
                    btn.style.backgroundImage = `url(${shape.src})`;
                    btn.onclick = () => spawnBlock(i);
                    blockSelector.appendChild(btn);
                });

                loadingScreen.style.display = 'none';
                canvas.style.display = 'block';
                blockPanel.style.display = 'flex'; 
                resizeCanvas();
                requestAnimationFrame(gameLoop);
            }
        }
    }

    function resizeCanvas() {
        CSS_WIDTH = gameContainer.clientWidth;
        CSS_HEIGHT = gameContainer.clientHeight;
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = CSS_WIDTH * dpr;
        canvas.height = CSS_HEIGHT * dpr;
        canvas.style.width = CSS_WIDTH + 'px';
        canvas.style.height = CSS_HEIGHT + 'px';
        ctx.scale(dpr, dpr);
        
        BLOCK_SIZE = Math.min(CSS_WIDTH, CSS_HEIGHT) / 36; 
        COLS = CSS_WIDTH / BLOCK_SIZE; 

        draw();
    }
    window.addEventListener('resize', resizeCanvas);

    function spawnBlock(index) {
        if (isGameOver) return; 

        const shape = SHAPES[index];

        if (activeBlock) {
            activeBlock.w = shape.origW;
            activeBlock.h = shape.origH;
            activeBlock.origW = shape.origW;
            activeBlock.origH = shape.origH;
            activeBlock.img = shape.img;
            activeBlock.rotated = false; 
            
            lockTimer = 0; 

            if (activeBlock.x + activeBlock.w > COLS) {
                activeBlock.x = COLS - activeBlock.w;
            }
            const targetY = getTargetY(activeBlock);
            if (activeBlock.y < targetY) {
                activeBlock.y = targetY;
            }
        } else {
            activeBlock = {
                x: (COLS / 2) - (shape.origW / 2),
                y: CSS_HEIGHT / BLOCK_SIZE,
                w: shape.origW,
                h: shape.origH,
                origW: shape.origW,
                origH: shape.origH,
                img: shape.img,
                rotated: false
            };
            lockTimer = 0; 

            const targetY = getTargetY(activeBlock);
            if (targetY + activeBlock.h >= CSS_HEIGHT / BLOCK_SIZE) {
                activeBlock = null; 
                showGameOver();
            }
        }
    }

    function getTargetX(block, dx) {
        let newX = block.x + dx;
        const eps = 0.001;
        if (newX < 0) newX = 0;
        if (newX + block.w > COLS) newX = COLS - block.w;
        
        for (let b of lockedBlocks) {
            if (block.y + eps < b.y + b.h && block.y + block.h - eps > b.y) {
                if (dx > 0) { if (block.x + block.w <= b.x + eps && newX + block.w > b.x) newX = b.x - block.w; } 
                else if (dx < 0) { if (block.x >= b.x + b.w - eps && newX < b.x + b.w) newX = b.x + b.w; }
            }
        }
        return newX;
    }

    function getTargetY(block) {
        let maxAllowedY = 0; 
        const eps = 0.001; 
        for (let b of lockedBlocks) {
            if (block.x + eps < b.x + b.w && block.x + block.w - eps > b.x) {
                if (b.y + b.h <= block.y + eps) {
                    let potentialY = b.y + b.h;
                    if (potentialY > maxAllowedY) maxAllowedY = potentialY; 
                }
            }
        }
        return maxAllowedY;
    }

    function isValidRotation(newW, newH) {
        if (activeBlock.x < 0 || activeBlock.x + newW > COLS) return false;
        const eps = 0.001;
        for (let b of lockedBlocks) {
            if (activeBlock.x + eps < b.x + b.w && activeBlock.x + newW - eps > b.x &&
                activeBlock.y + eps < b.y + b.h && activeBlock.y + newH - eps > b.y) {
                return false;
            }
        }
        return true;
    }

    function lockBlock() {
        lockedBlocks.push({...activeBlock});
        activeBlock = null;
        lockTimer = 0;
    }

    function draw() {
        ctx.fillStyle = '#ffffff'; 
        ctx.fillRect(0, 0, CSS_WIDTH, CSS_HEIGHT);

        ctx.strokeStyle = 'rgba(0, 0, 0, 0.04)';
        ctx.lineWidth = 1;
        
        for(let i=0; i<=Math.ceil(COLS); i++) { 
            ctx.beginPath(); ctx.moveTo(i*BLOCK_SIZE, 0); ctx.lineTo(i*BLOCK_SIZE, CSS_HEIGHT); ctx.stroke(); 
        }
        for(let i=0; i*BLOCK_SIZE <= CSS_HEIGHT; i++) {
            const lineY = CSS_HEIGHT - i*BLOCK_SIZE;
            ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(CSS_WIDTH, lineY); ctx.stroke();
        }

        lockedBlocks.forEach(renderBlock);

        if (activeBlock && !isGameOver) {
            const targetY = getTargetY(activeBlock);
            if (targetY < activeBlock.y) {
                ctx.save();
                ctx.globalAlpha = 0.25; 
                const ghostBlock = { ...activeBlock, y: targetY };
                renderBlock(ghostBlock);
                ctx.restore();
            }
            renderBlock(activeBlock);
        }
    }

    function renderBlock(block) {
        ctx.save();
        const pixelX = (block.x + block.w/2) * BLOCK_SIZE;
        const pixelY = CSS_HEIGHT - (block.y + block.h/2) * BLOCK_SIZE;
        
        ctx.translate(pixelX, pixelY);
        if (block.rotated) {
            ctx.rotate(Math.PI / 2);
            ctx.drawImage(block.img, -block.origW/2 * BLOCK_SIZE, -block.origH/2 * BLOCK_SIZE, block.origW * BLOCK_SIZE, block.origH * BLOCK_SIZE);
        } else {
            ctx.drawImage(block.img, -block.w/2 * BLOCK_SIZE, -block.h/2 * BLOCK_SIZE, block.w * BLOCK_SIZE, block.h * BLOCK_SIZE);
        }
        ctx.restore();
    }

    function gameLoop(time) {
        if (!lastTime) lastTime = time;
        const deltaTime = (time - lastTime) / 1000; 
        lastTime = time;

        fallSpeed = parseFloat(canvas.getAttribute('data-fall-speed')) || 5;
        moveSpeed = parseFloat(canvas.getAttribute('data-move-speed')) || 20;

        if (activeBlock && !isGameOver) {
            let dx = 0;
            if (keys.left) dx -= moveSpeed * deltaTime;
            if (keys.right) dx += moveSpeed * deltaTime;
            
            if (dx !== 0) activeBlock.x = getTargetX(activeBlock, dx);

            let currentFallSpeed = keys.down ? fallSpeed * 4 : fallSpeed;
            
            let targetY = getTargetY(activeBlock);
            
            activeBlock.y -= currentFallSpeed * deltaTime;

            if (activeBlock.y <= targetY) {
                activeBlock.y = targetY; 
                lockTimer += deltaTime; 
                
                if (lockTimer >= LOCK_DELAY) {
                    lockBlock();
                }
            } else {
                lockTimer = 0;
            }
        }

        draw();
        requestAnimationFrame(gameLoop);
    }

    function rotate() {
        if (!activeBlock || isGameOver) return;
        const newW = activeBlock.h;
        const newH = activeBlock.w;
        if (isValidRotation(newW, newH)) {
            activeBlock.w = newW;
            activeBlock.h = newH;
            activeBlock.rotated = !activeBlock.rotated;
            
            const targetY = getTargetY(activeBlock);
            if (activeBlock.y < targetY) activeBlock.y = targetY; 
        }
    }

    function hardDrop() {
        if (!activeBlock || isGameOver) return;
        activeBlock.y = getTargetY(activeBlock);
        lockTimer = 0; 
    }

    function showGameOver() {
        isGameOver = true;
        gameOverOverlay.style.display = 'flex';
    }

    document.getElementById('retry-btn').addEventListener('click', () => {
        lockedBlocks = [];
        isGameOver = false;
        gameOverOverlay.style.display = 'none';
        lockTimer = 0;
        draw();
    });

    document.getElementById('download-btn').addEventListener('click', () => {
        draw(); 
        try {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'my-pattern-design.png';
            link.href = dataURL;
            link.click();
        } catch (e) {
            alert("외부 이미지 서버의 보안 정책(CORS)으로 인해 다운로드가 차단되었습니다. 로컬 경로의 이미지를 사용하시면 정상 작동합니다.");
        }
    });

    document.addEventListener('keydown', e => {
        if (isGameOver) return;
        if (e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'ArrowRight') keys.right = true;
        if (e.code === 'ArrowDown') keys.down = true;
        if (e.code === 'ArrowUp') rotate();
        if (e.code === 'Space') { e.preventDefault(); hardDrop(); }
    });

    document.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft') keys.left = false;
        if (e.code === 'ArrowRight') keys.right = false;
        if (e.code === 'ArrowDown') keys.down = false;
    });

    let touchStartX = 0, touchStartY = 0;
    let lastTouchX = 0;
    let touchStartTime = 0;

    canvas.addEventListener('touchstart', e => {
        if(isGameOver) return;
        touchStartX = e.changedTouches[0].clientX; 
        touchStartY = e.changedTouches[0].clientY;
        lastTouchX = touchStartX;
        touchStartTime = Date.now();
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        if (!activeBlock || isGameOver) return;
        let currentTouchX = e.changedTouches[0].clientX;
        let dxPixels = currentTouchX - lastTouchX;
        
        let dxUnits = (dxPixels / BLOCK_SIZE) * 0.5; 
        
        if (Math.abs(dxUnits) > 0.01) {
            activeBlock.x = getTargetX(activeBlock, dxUnits);
            lastTouchX = currentTouchX;
        }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        if (!activeBlock || isGameOver) return;
        let touchEndX = e.changedTouches[0].clientX;
        let touchEndY = e.changedTouches[0].clientY;
        
        let dx = touchEndX - touchStartX;
        let dy = touchEndY - touchStartY;
        let timeElapsed = Date.now() - touchStartTime;
        
        if (dy > 40 && Math.abs(dy) > Math.abs(dx)) {
            hardDrop(); 
        }
        else if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && timeElapsed < 300) {
            rotate();
        }
    }, { passive: false });

    loadAssets();
</script>
</body>
</html>
